# ScottClip Configuration
# Created by /scottclip-init – customize for your repo
version: 1

# Linear workspace settings
linear:
  user_name: "{{USER_NAME}}"         # Board user's display name (used in @-mentions)
  board_user: "{{BOARD_USER}}"       # Board member to @-mention for escalations (often same as user_name)
  team: "{{TEAM}}"                   # Default team for new issues/sub-issues
  team_id: "{{TEAM_ID}}"             # Linear team ID (used for webhook filtering)
  project: null                      # Optional: scope inbox to a specific project

# Linear Agent MCP configuration
# These values are also set in .mcp.json env vars for the linear-agent server
linear_agent:
  client_id: "{{LINEAR_CLIENT_ID}}"     # OAuth app client ID
  webhook_secret: "{{LINEAR_WEBHOOK_SECRET}}"  # HMAC secret for webhook validation
  webhook_port: 3847                      # Local port for webhook receiver

# Heartbeat behavior
heartbeat:
  max_issues_per_heartbeat: 2        # Max issues to work per heartbeat cycle
  stale_lock_hours: 4                # Hours before a lockfile is considered stale

  # Quiet hours – skip or limit heartbeats during off-hours
  quiet_hours:
    enabled: false
    timezone: "America/Los_Angeles"
    start: "22:00"
    end: "07:00"
    behavior: "skip"                 # "skip" = no heartbeat; "triage-only" = orchestrator triage only

  # Error cooldown – back off on repeated failures
  cooldown:
    max_consecutive_failures: 3      # Pause schedule after N failures
    backoff_multiplier: 2            # Double interval on consecutive failures

# Linear label configuration
labels:
  group: "ScottClip"                 # Parent label group for persona labels (auto-created by init)

# Persona routing: Linear label → persona directory
# The Orchestrator (is_default: true) handles issues with no persona label
personas:
  orchestrator:
    path: "personas/orchestrator"
    label: null
    is_default: true
  ceo:
    path: "personas/ceo"
    label: "ceo"
  backend:
    path: "personas/backend"
    label: "backend"
  frontend:
    path: "personas/frontend"
    label: "frontend"
